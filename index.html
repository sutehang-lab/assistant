<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BG 页面</title>
  <style>
    @property --glow-angle {
      syntax: '<angle>';
      initial-value: 0deg;
      inherits: false;
    }

    :root {
      --stage-w: 2880;
      --stage-h: 1620;
      --scene-scale: 1;
      --stage-scale: 1;
      --line-y: 991.97px;
      --glow-height: 340px;
      --line-h: 4px;
      --line-main-w: 100px;
      --line-tail-w: 100px;
      --line-dark: #313131;
      --gradient-base: #ED8A2E 0%, #FF6123 11%, #E44E8A 33%, #AF5BE7 40%, #CC98FF 50%, #AF5BE7 60%, #E44E8A 67%, #FF6123 89%, #ED8A2E 100%;
      --gradient-asr: #ED8A2E 0%, #F47A28 6%, #FF6123 12%, #E94A1B 18%, #CD3012 24%, #D43D4E 30%, #E44E8A 38%, #CA55B8 44%, #AF5BE7 50%, #BD7AF3 56%, #CC98FF 62%, #BD7AF3 68%, #AF5BE7 74%, #CA55B8 80%, #E44E8A 86%, #CD3012 90%, #FF6123 94%, #ED8A2E 100%;
      --gradient-finished: #b69cff 0%, #6ec7ff 22%, #4fb7ff 38%, #a055f3 50%, #4fb7ff 62%, #6ec7ff 78%, #b69cff 100%;
      --line-sync-gradient: #ED8A2E 0%, #CD3012 20%, #E44E8A 40%, #AF5BE7 60%, #CC98FF 80%, #CC98FF 100%;
      --line-sync-dur: 8s;
      --line-main-gradient: linear-gradient(90deg, var(--gradient-base));
      --line-finished-gradient: linear-gradient(90deg, var(--gradient-finished));
      --light-gradient-a: linear-gradient(90deg, #eec5b2 7%, #df855b 18%, #daa0c3 42%, #d5f0ef 69%, rgba(216, 216, 216, 0) 93%);
      --light-gradient-b: linear-gradient(90deg, #eeb2e2 7%, #dfc05b 18%, #daa0c3 42%, #d5f0ef 69%, rgba(216, 216, 216, 0) 93%);
      --dock-align-offset-y: 0px;
      --bot-offset-y: 8px;
      --glow-offset-y: 10px;
      --robot-scale: 1;
      --aurora-scale: 1.5;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #000;
    }

    .stage {
      position: fixed;
      top: 50%;
      left: 50%;
      width: calc(var(--stage-w) * 1px);
      height: calc(var(--stage-h) * 1px);
      transform: translate(-50%, -50%) scale(var(--stage-scale));
      transform-origin: center center;
      overflow: hidden;
      background-image: url("image/bg.png");
      background-repeat: no-repeat;
      background-position: center center;
      background-size: 100% 100%;
    }

    .scene-root {
      position: absolute;
      left: 0;
      top: 0;
      width: 1920px;
      height: 1080px;
      transform: scale(var(--scene-scale));
      transform-origin: 0 0;
    }

    .overlay {
      position: absolute;
      inset: 0 0 auto 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .lights {
      display: none;
    }

    .light-sprite {
      position: absolute;
      left: 0;
      width: 100%;
      border-radius: 999px 999px 0 0;
      background-repeat: no-repeat;
      background-size: 100% 100%;
      background-position: 50% 50%;
      transform-origin: 50% 100%;
      will-change: transform, filter, opacity, background-position;
      /* 从下往上逐渐消失，避免硬边 */
      mask-image: linear-gradient(to top, rgba(0, 0, 0, 0.99) 0%, rgba(0, 0, 0, 0.94) 66%, rgba(0, 0, 0, 0.72) 90%, transparent 100%);
      -webkit-mask-image: linear-gradient(to top, rgba(0, 0, 0, 0.99) 0%, rgba(0, 0, 0, 0.94) 66%, rgba(0, 0, 0, 0.72) 90%, transparent 100%);
      mix-blend-mode: normal;
    }

    /* 中层：中度模糊层（约40px高） */
    .light-sprite.is-mid {
      bottom: 8px;
      height: 126px;
      filter: blur(96px) saturate(1.95) brightness(1.62);
      background-image:
        radial-gradient(76% 132% at 16% 100%, rgba(223, 133, 91, 1) 0%, rgba(223, 133, 91, 0) 82%),
        radial-gradient(102% 170% at 50% 100%, rgba(218, 160, 195, 1) 0%, rgba(218, 160, 195, 0) 88%),
        radial-gradient(82% 136% at 84% 100%, rgba(213, 240, 239, 1) 0%, rgba(213, 240, 239, 0) 84%),
        radial-gradient(88% 145% at 52% 100%, rgba(238, 178, 226, 0.84) 0%, rgba(238, 178, 226, 0) 86%);
      opacity: 1;
      animation: glowFlowMid 7s ease-in-out infinite;
    }

    /* 顶层：灵魂层，超高模糊大体积烟雾 */
    .light-sprite.is-top {
      bottom: -82px;
      height: 300px;
      filter: blur(228px) saturate(1.86) brightness(1.64);
      background-image:
        radial-gradient(92% 160% at 12% 100%, rgba(238, 197, 178, 0.98) 0%, rgba(238, 197, 178, 0) 88%),
        radial-gradient(112% 186% at 50% 100%, rgba(218, 160, 195, 1) 0%, rgba(218, 160, 195, 0) 90%),
        radial-gradient(92% 160% at 88% 100%, rgba(213, 240, 239, 0.98) 0%, rgba(213, 240, 239, 0) 88%),
        radial-gradient(96% 168% at 50% 100%, rgba(223, 192, 91, 0.7) 0%, rgba(223, 192, 91, 0) 90%);
      opacity: 1;
      transform: scaleX(1.28) scaleY(1.36);
      animation: glowFlowTop 9.8s ease-in-out infinite;
    }

    .light-sprite.is-upper {
      bottom: 40px;
      height: 190px;
      filter: blur(132px) saturate(1.72) brightness(1.42);
      background-image:
        radial-gradient(84% 150% at 18% 100%, rgba(223, 133, 91, 0.78) 0%, rgba(223, 133, 91, 0) 86%),
        radial-gradient(106% 188% at 50% 100%, rgba(218, 160, 195, 0.92) 0%, rgba(218, 160, 195, 0) 90%),
        radial-gradient(84% 150% at 82% 100%, rgba(213, 240, 239, 0.78) 0%, rgba(213, 240, 239, 0) 86%);
      opacity: 1;
      animation: glowFlowUpper 12.5s ease-in-out infinite;
    }

    /* 贴底高亮层：保证和彩色线贴边发亮 */
    .light-sprite.is-core {
      bottom: -1px;
      height: 18px;
      filter: blur(28px) saturate(1.78) brightness(1.68);
      background-image: var(--line-main-gradient);
      opacity: 1;
      animation: glowFlowCore 5.2s linear infinite;
    }

    .lines {
      position: absolute;
      left: 24px;
      top: 0;
      width: 1872px;
      height: 88px;
      transition: transform 620ms cubic-bezier(.22, .8, .2, 1);
      will-change: transform;
    }

    /* 顶部居中展示，不再做右侧进场位移 */
    .layout-right .lines,
    .layout-right.state-default .lines,
    .layout-right.state-awaken .lines {
      transform: translateX(0) !important;
    }

    .layout-right .line-mid,
    .layout-right .line-tail,
    .layout-right.state-default .line-mid,
    .layout-right.state-default .line-tail,
    .layout-right.state-awaken .line-mid,
    .layout-right.state-awaken .line-tail {
      transform: translateX(0) !important;
    }

    .layout-right .lines {
      transform: translateX(1756px);
    }

    .layout-right .line-mid,
    .layout-right .line-tail {
      transform: translateX(-1872px);
    }

    .layout-right.state-default .lines {
      transform: translateX(1771px);
    }

    .layout-right.state-default .line-mid,
    .layout-right.state-default .line-tail {
      transform: translateX(-1887px);
    }

    .layout-right.state-awaken .lines {
      transform: translateX(1706px);
    }

    .layout-right.state-awaken .line-mid,
    .layout-right.state-awaken .line-tail {
      transform: translateX(-1822px);
    }

    .layout-right.state-awaken .line-mid {
      left: 116px;
    }

    .layout-right.state-default .line-main,
    .layout-right.state-awaken .line-main {
      background: linear-gradient(90deg, var(--line-sync-gradient));
      background-size: 240% 100%;
      animation: lineSyncFlow var(--line-sync-dur) linear infinite;
    }

    .layout-right.state-default .line-diffusion,
    .layout-right.state-awaken .line-diffusion {
      left: 0;
      top: -98px;
      width: var(--line-main-w);
      height: 200px;
      clip-path: inset(-50px -10px 98px -10px);
      opacity: 1;
      mask-image: linear-gradient(to top, rgba(0, 0, 0, 1) 0%, rgba(0, 0, 0, 0.8) 30%, rgba(0, 0, 0, 0.4) 60%, transparent 90%),
        linear-gradient(to right, transparent 0%, rgba(0, 0, 0, 0.8) 12%, rgba(0, 0, 0, 1) 30%, rgba(0, 0, 0, 1) 70%, rgba(0, 0, 0, 0.8) 88%, transparent 100%);
      -webkit-mask-image: linear-gradient(to top, rgba(0, 0, 0, 1) 0%, rgba(0, 0, 0, 0.8) 30%, rgba(0, 0, 0, 0.4) 60%, transparent 90%),
        linear-gradient(to right, transparent 0%, rgba(0, 0, 0, 0.8) 12%, rgba(0, 0, 0, 1) 30%, rgba(0, 0, 0, 1) 70%, rgba(0, 0, 0, 0.8) 88%, transparent 100%);
      mask-composite: intersect;
      -webkit-mask-composite: source-in;
    }

    .layout-right.state-default .line-diffusion::before,
    .layout-right.state-default .line-diffusion::after,
    .layout-right.state-awaken .line-diffusion::before,
    .layout-right.state-awaken .line-diffusion::after {
      opacity: 0;
    }

    .layout-right.state-awaken .aurora-glow,
    .layout-right.state-awaken .particle-canvas {
      opacity: 0;
    }

    .layout-right.state-default .line-diffusion,
    .layout-right.state-default .line-diffusion::before,
    .layout-right.state-default .line-diffusion::after {
      opacity: 0 !important;
    }

    .awaken-glow-visible.layout-right .aurora-glow,
    .awaken-glow-visible.layout-right .particle-canvas {
      opacity: 1;
    }

    /* 进入左滑后会去掉 layout-right，这里兜底保持同一条光晕持续可见 */
    .awaken-glow-visible .aurora-glow,
    .awaken-glow-slide .aurora-glow {
      opacity: 1 !important;
    }

    .awaken-glow-visible.layout-right.state-default .aurora-glow,
    .awaken-glow-visible.layout-right.state-default .particle-canvas {
      opacity: 1 !important;
    }

    .awaken-glow-visible.layout-right .aurora-glow {
      left: -98px;
      width: 224px;
    }

    .awaken-glow-visible.layout-right .aurora-glow {
      transition-duration: 900ms;
      transition-timing-function: ease;
    }

    .awaken-glow-visible.layout-right .particle-canvas {
      left: -98px;
      width: 224px;
      transition-duration: 900ms;
      transition-timing-function: ease;
    }

    .awaken-glow-slide .lines {
      transition-duration: 1500ms;
      transition-timing-function: cubic-bezier(.22, .8, .2, 1);
    }

    /* 唤起专用光晕只保留单层 aurora，去掉多层干扰 */
    .awaken-glow-visible .line-diffusion,
    .awaken-glow-visible .line-diffusion::before,
    .awaken-glow-visible .line-diffusion::after,
    .awaken-glow-slide .line-diffusion,
    .awaken-glow-slide .line-diffusion::before,
    .awaken-glow-slide .line-diffusion::after {
      opacity: 0 !important;
    }

    .awaken-glow-visible .particle-canvas,
    .awaken-glow-slide .particle-canvas,
    .awaken-glow-settled .particle-canvas {
      opacity: 1 !important;
    }

    .awaken-glow-slide .aurora-glow {
      left: 0;
      width: 608px;
      transform: translateX(0);
      transition: left 1500ms cubic-bezier(.22, .8, .2, 1), width 1500ms cubic-bezier(.22, .8, .2, 1), opacity 900ms ease;
    }

    .awaken-glow-slide .particle-canvas,
    .awaken-glow-settled .particle-canvas {
      left: 0;
      width: 608px;
      transform: translateX(0);
      transition: left 1500ms cubic-bezier(.22, .8, .2, 1), width 1500ms cubic-bezier(.22, .8, .2, 1), opacity 900ms ease;
    }

    .awaken-glow-settled .aurora-glow {
      left: 0 !important;
      width: 608px !important;
      transform: translateX(0) !important;
      opacity: 1 !important;
      transition: none !important;
    }

    .aurora-params-handoff .aurora-glow,
    .aurora-params-handoff .particle-canvas {
      transition: none !important;
    }

    .aurora-geometry-lock .aurora-glow {
      left: 0 !important;
      width: 608px !important;
      transform: translateX(0) !important;
      opacity: 1 !important;
      transition: none !important;
    }

    .state-asr .aurora-glow,
    .state-thinking .aurora-glow,
    .state-task .aurora-glow {
      left: 0;
      width: 608px;
      transform: translateX(0);
    }

    .state-asr .particle-canvas,
    .state-thinking .particle-canvas,
    .state-task .particle-canvas {
      left: 0;
      width: 608px;
      transform: translateX(0);
    }

    .awaken-glow-fade.layout-right.state-awaken .line-diffusion,
    .awaken-glow-fade.layout-right.state-awaken .aurora-glow,
    .awaken-glow-fade.layout-right.state-awaken .particle-canvas {
      opacity: 0;
      transition-duration: 900ms;
      transition-timing-function: ease-out;
    }

    .shift-fast .lines {
      transition-duration: 1500ms;
    }

    .shift-fast .line-main {
      transition-duration: 1500ms, 1500ms;
      transition-timing-function: cubic-bezier(.22, .8, .2, 1), cubic-bezier(.22, .8, .2, 1);
    }

    .shift-fast .line-diffusion {
      transition-duration: 1500ms, 1500ms, 1500ms, 1500ms, 1500ms, 1500ms;
      transition-timing-function: cubic-bezier(.22, .8, .2, 1), cubic-bezier(.22, .8, .2, 1), cubic-bezier(.22, .8, .2, 1), cubic-bezier(.22, .8, .2, 1), cubic-bezier(.22, .8, .2, 1), cubic-bezier(.22, .8, .2, 1);
    }

    .shift-fast .line-mid {
      transition-duration: 1500ms, 1500ms, 1500ms;
      transition-timing-function: cubic-bezier(.22, .8, .2, 1), cubic-bezier(.22, .8, .2, 1), cubic-bezier(.22, .8, .2, 1);
    }

    .shift-fast .line-tail {
      transition-duration: 1500ms, 1500ms;
      transition-timing-function: cubic-bezier(.22, .8, .2, 1), cubic-bezier(.22, .8, .2, 1);
    }

    .shift-fast .mini-bot {
      transition-duration: 1500ms, 1500ms;
      transition-timing-function: cubic-bezier(.22, .8, .2, 1), cubic-bezier(.22, .8, .2, 1);
    }

    .shift-fast .mini-bot-default,
    .shift-fast .mini-bot-awaken {
      transition-duration: 1500ms, 1500ms;
      transition-timing-function: cubic-bezier(.22, .8, .2, 1), cubic-bezier(.22, .8, .2, 1);
    }

    .shift-fast .bot-clip {
      transition-duration: 1500ms;
      transition-timing-function: cubic-bezier(.22, .8, .2, 1);
    }

    .line {
      position: absolute;
      top: 0;
      border-radius: 999px;
    }

    .line-main {
      left: 0;
      width: var(--line-main-w);
      height: 4px;
      background: var(--line-dark);
      background-size: 100% 100%;
      transition: width 500ms cubic-bezier(.25, .8, .25, 1), background 400ms ease;
    }

    .line-main,
    .line-main-svg,
    .line-mid,
    .line-tail {
      display: none !important;
    }

    .line-diffusion {
      position: absolute;
      left: 0;
      top: calc(-98px + var(--glow-offset-y));
      width: var(--line-main-w);
      height: 200px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 600ms ease, left 500ms ease, top 500ms ease, width 500ms ease, height 500ms ease, clip-path 500ms ease;
      clip-path: inset(-50px -10px 98px -10px);
      mask-image: linear-gradient(to top, rgba(0, 0, 0, 1) 0%, rgba(0, 0, 0, 0.8) 30%, rgba(0, 0, 0, 0.4) 60%, transparent 90%),
        linear-gradient(to right, transparent 0%, rgba(0, 0, 0, 0.8) 12%, rgba(0, 0, 0, 1) 30%, rgba(0, 0, 0, 1) 70%, rgba(0, 0, 0, 0.8) 88%, transparent 100%);
      -webkit-mask-image: linear-gradient(to top, rgba(0, 0, 0, 1) 0%, rgba(0, 0, 0, 0.8) 30%, rgba(0, 0, 0, 0.4) 60%, transparent 90%),
        linear-gradient(to right, transparent 0%, rgba(0, 0, 0, 0.8) 12%, rgba(0, 0, 0, 1) 30%, rgba(0, 0, 0, 1) 70%, rgba(0, 0, 0, 0.8) 88%, transparent 100%);
      mask-composite: intersect;
      -webkit-mask-composite: source-in;
    }

    .line-diffusion::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: var(--line-main-gradient);
      background-size: 200% 100%;
      filter: blur(32px);
      transform: scaleX(1.15) scaleY(1.6);
      transform-origin: center bottom;
      mask-image: radial-gradient(ellipse at center bottom, rgba(0, 0, 0, 0.6) 0%, rgba(0, 0, 0, 0.3) 40%, transparent 70%);
      -webkit-mask-image: radial-gradient(ellipse at center bottom, rgba(0, 0, 0, 0.6) 0%, rgba(0, 0, 0, 0.3) 40%, transparent 70%);
      mix-blend-mode: screen;
      opacity: 0;
      transition: opacity 600ms ease;
      pointer-events: none;
    }

    .line-diffusion::after {
      content: "";
      position: absolute;
      inset: 0;
      background-image: var(--line-main-gradient);
      background-size: 200% 100%;
      filter: blur(8px);
      mask-image: radial-gradient(ellipse at center, rgba(0, 0, 0, 1) 0%, transparent 70%);
      mask-repeat: no-repeat;
      -webkit-mask-image: radial-gradient(ellipse at center, rgba(0, 0, 0, 1) 0%, transparent 70%);
      -webkit-mask-repeat: no-repeat;
      animation: colorFlow 16s linear infinite, spotFlow 8s linear infinite;
      mix-blend-mode: screen;
    }

    .state-awaken {
      --line-main-w: 160px;
    }

    .awaken-to-interaction {
      --line-main-w: 608px;
    }

    .state-interaction {
      --line-main-w: 608px;
    }

    .state-awaken .line-main {
      background: var(--line-main-gradient);
      background-size: 200% 100%;
      animation: colorFlow 6s linear infinite;
    }

    .state-interaction .line-main {
      background: linear-gradient(90deg, var(--line-sync-gradient));
      background-size: 240% 100%;
      animation: lineSyncFlow var(--line-sync-dur) linear infinite;
    }

    .state-awaken .line-diffusion,
    .state-interaction .line-diffusion {
      opacity: 1;
    }

    .state-awaken .line-diffusion {
      left: -20px;
      top: calc(-80px + var(--glow-offset-y));
      width: 200px;
      height: 84px;
      clip-path: inset(-300px -300px -300px -300px);
      mask-image: linear-gradient(to top, rgba(0, 0, 0, 1) 0%, rgba(0, 0, 0, 0.6) 50%, transparent 100%),
        linear-gradient(to right, transparent 5%, rgba(0, 0, 0, 0.9) 25%, rgba(0, 0, 0, 1) 50%, rgba(0, 0, 0, 0.7) 80%, transparent 100%);
      -webkit-mask-image: linear-gradient(to top, rgba(0, 0, 0, 1) 0%, rgba(0, 0, 0, 0.6) 50%, transparent 100%),
        linear-gradient(to right, transparent 5%, rgba(0, 0, 0, 0.9) 25%, rgba(0, 0, 0, 1) 50%, rgba(0, 0, 0, 0.7) 80%, transparent 100%);
      mask-composite: intersect;
      -webkit-mask-composite: source-in;
    }

    .state-awaken .line-diffusion::after {
      filter: blur(16px) saturate(1.8) brightness(0.9);
      transform-origin: center bottom;
      animation: breathGlow 2.4s ease-in-out infinite, colorFlow 16s linear infinite;
    }

    .state-awaken .line-diffusion,
    .state-awaken .line-diffusion::before,
    .state-awaken .line-diffusion::after {
      opacity: 0 !important;
    }

    .state-interaction .line-diffusion::after {
      filter: blur(10px) saturate(1.8) brightness(0.9);
      animation: colorFlow 12s linear infinite, spotFlow 6.8s linear infinite;
    }

    .finished-active .line-main {
      background-image: var(--line-finished-gradient);
      background-size: 200% 100%;
    }

    .finished-active .line-main-path {
      stroke: url(#lineMainGradientFinished);
    }

    .panel-active .line-diffusion {
      opacity: 0;
      transition: opacity 240ms ease;
    }

    .finished-active .line-diffusion::after {
      background-image: var(--line-finished-gradient);
    }

    .line-main-svg {
      position: absolute;
      left: 0;
      top: -8px;
      width: 608px;
      height: 24px;
      overflow: visible;
      opacity: 0;
    }

    .line-main-path {
      fill: none;
      stroke: url(#lineMainGradient);
      stroke-width: 4;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .is-waving .line-main {
      opacity: 1;
    }

    .is-waving .line-main-svg {
      opacity: 0;
    }

    .is-waving .line-diffusion {
      opacity: 1;
      transition: opacity 200ms ease;
    }

    .bot-clip {
      position: absolute;
      left: 2500px;
      top: 1080px;
      width: calc(420px * var(--robot-scale));
      height: calc(420px * var(--robot-scale));
      overflow: visible;
      pointer-events: none;
      z-index: 4;
      transform: none !important;
      transition: none;
    }

    .state-default .bot-clip,
    .state-awaken .bot-clip {
      overflow: visible;
    }

    .layout-right .bot-clip {
      transform: none !important;
    }

    .mini-bot {
      position: absolute;
      left: 0;
      top: 0;
      width: calc(420px * var(--robot-scale));
      height: calc(420px * var(--robot-scale));
      transition: opacity 350ms ease, transform 500ms cubic-bezier(.25, .8, .25, 1);
      transform: none;
      transform-origin: 50% 100%;
      pointer-events: none;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      will-change: transform;
    }

    .mini-bot-default,
    .mini-bot-awaken {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-repeat: no-repeat;
      background-position: left top;
      background-size: 100% 100%;
      transition: opacity 500ms ease, transform 500ms cubic-bezier(.25, .8, .25, 1);
      transform: translateY(0);
      transform-origin: 50% 100%;
    }

    .mini-bot-default {
      opacity: 1;
      background-image: url("image/机器人_默认@1x.png");
    }

    .mini-bot-awaken {
      opacity: 0;
      background-image: url("image/机器人_唤起@1x.png");
    }

    .mini-bot-seq-frame {
      position: absolute;
      left: 0;
      top: 0;

              <input type="range" id="dm-ctrl-off-x" min="-80" max="80" step="1" value="0">
            </label>
            <label>垂直偏移 <span id="dm-val-off-y">0</span>
              <input type="range" id="dm-ctrl-off-y" min="-80" max="80" step="1" value="0">
            </label>
            <label>圆孔半径 <span id="dm-val-radius">8.9</span>
              <input type="range" id="dm-ctrl-radius" min="0.8" max="10" step="0.1" value="8.9">
            </label>
            <label>上下大小差 <span id="dm-val-falloff">0.22</span>
              <input type="range" id="dm-ctrl-falloff" min="0" max="1" step="0.02" value="0.22">
            </label>
            <label>列数（密度） <span id="dm-val-cols">56</span>
              <input type="range" id="dm-ctrl-cols" min="24" max="100" step="1" value="56">
            </label>
            <label>横向间距倍率 <span id="dm-val-pitch-mul">1.00</span>
              <input type="range" id="dm-ctrl-pitch-mul" min="0.6" max="1.6" step="0.02" value="1">
            </label>
            <div class="dot-matrix-panel-row-check">
              <input type="checkbox" id="dm-ctrl-stagger">
              <label for="dm-ctrl-stagger" style="margin:0">奇偶行交错（蜂窝感）</label>
            </div>
            <div class="dot-matrix-btn-row">
              <button type="button" id="dm-reset-btn">重置</button>
              <button type="button" id="dm-save-btn" style="background:#2a6a3a">保存</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script>
    (function () {
      const root = document.documentElement;
      const body = document.body;
      const stage = document.querySelector(".stage");
      const stageW = 2880;
      const stageH = 1620;
      const bgToggleBtn = document.getElementById("bg-toggle-btn");
      const defaultBtn = document.getElementById("state-default-btn");
      const awakenBtn = document.getElementById("state-awaken-btn");
      const asrBtn = document.getElementById("state-asr-btn");
      const thinkingBtn = document.getElementById("state-thinking-btn");
      const taskBtn = document.getElementById("state-task-btn");
      const headBtn = document.getElementById("state-head-btn");
      const aiCapsuleBtn = document.getElementById("ai-capsule-btn");
      const asrPopupToggle = document.getElementById("asr-popup-toggle");
      const miniBotAwaken = document.querySelector(".mini-bot-awaken");
      const miniBotSeqFrame = document.getElementById("mini-bot-seq-frame");
      const taskStatusWrap = document.getElementById("task-status-wrap");
      const headInfoCard = document.getElementById("head-info-card");
      const asrTopPopup = document.getElementById("asr-top-popup");
      const aiCapsuleCard = document.getElementById("ai-capsule-card");
      const taskStatusProgress = document.getElementById("task-status-progress");
      const taskProgressCurrent = document.getElementById("task-progress-current");
      const taskProgressTotal = document.getElementById("task-progress-total");
      const taskStepBars = Array.from(document.querySelectorAll(".task-status-icon-bars span"));
      const lineMainPath = document.getElementById("line-main-path");
      const allBtns = { "state-default": defaultBtn, "state-awaken": awakenBtn, "state-asr": asrBtn, "state-thinking": thinkingBtn, "state-task": taskBtn, "state-head": headBtn };
      const flowTimers = [];
      var thinkingThrowTimer = null;
      var thinkingTaskTimer = null;
      var taskStepTimer = null;
      var taskDismissTimer = null;
      var taskStepIndex = 0;
      var THINKING_AURORA_FLOW_MS = 3000;
      var THINKING_TASK_PANEL_DELAY_MS = 5000;
      var BG_MODE_STORAGE_KEY = "vc-aios-bg-mode";
      var FORCE_GLOW_DEBUG_CENTER = false;
      var FORCE_SCREENSHOT_PANEL_DEFAULTS = true;
      var bgModeIndex = 0;
      var BG_IMAGES = [
        'url("image/背景_分屏地图.png")',
        'url("image/bg.png")',
        'url("image/分屏背景@1x.png")'
      ];
      var awakenSeqTimer = null;
      var awakenSeqRaf = 0;
      var awakenSlideTimer = null;
      var AWAKEN_SEQ_FPS = 24;
      var AWAKEN_SEQ_GLOW_TRIGGER_FRAME = 47;
      var AWAKEN_GLOW_SLIDE_MS = 1500;
      var AWAKEN_GLOW_HOLD_MS = 500;
      var botFrames = [];
      var botFrameImages = [];
      var botFramesReady = false;
      var botFramesReadyPromise = null;
      var botFrameIndex = -1;
      var botSeqRunning = false;
      var botSeqTriggered = false;

      bgModeIndex = 0;

      function initBotFrames() {
        botFrames = [];
        botFrameImages = [];
        botFramesReady = false;
        var decodePromises = [];
        for (var i = 0; i <= 75; i++) {
          var path = "image/小P沉入Dock栏变为音波/Image Sequence_440_" + String(i).padStart(4, "0") + ".png";
          botFrames.push('url("' + path + '")');
          var img = new Image();
          img.decoding = "async";
          var p = new Promise(function (resolve) {
            img.onload = function () { resolve(); };
            img.onerror = function () { resolve(); };
          });
          decodePromises.push(p);
          img.src = path;
          botFrameImages.push(img);
        }
        botFramesReadyPromise = Promise.all(decodePromises).then(function () {
          botFramesReady = true;
        });
      }

      function setBotFrame(index) {
        if (!miniBotAwaken || !botFrames.length) return;
        var safeIndex = Math.max(0, Math.min(botFrames.length - 1, index | 0));
        if (safeIndex === botFrameIndex && miniBotSeqFrame && miniBotSeqFrame.src) return;
        botFrameIndex = safeIndex;
        var loadedSrc = botFrameImages[safeIndex] && botFrameImages[safeIndex].src ? botFrameImages[safeIndex].src : "";
        if (miniBotSeqFrame) {
          var targetSrc = loadedSrc || ("image/小P沉入Dock栏变为音波/Image Sequence_440_" + String(safeIndex).padStart(4, "0") + ".png");
          if (miniBotSeqFrame.src !== targetSrc) miniBotSeqFrame.src = targetSrc;
        } else {
          miniBotAwaken.style.backgroundImage = loadedSrc ? 'url("' + loadedSrc + '")' : botFrames[safeIndex];
        }
      }

      function stopAwakenSequence() {
        if (awakenSeqTimer) {
          clearInterval(awakenSeqTimer);
          awakenSeqTimer = null;
        }
        if (awakenSeqRaf) {
          cancelAnimationFrame(awakenSeqRaf);
          awakenSeqRaf = 0;
        }
        botSeqRunning = false;
      }

      function ensureBotFramesReady(cb) {
        if (botFramesReady) {
          cb();
          return;
        }
        if (botFramesReadyPromise) {
          botFramesReadyPromise.then(function () { cb(); });
          return;
        }
        cb();
      }

      function playAwakenSequence(onNearEnd, onComplete) {
        stopAwakenSequence();
        if (!botFrames.length) return;
        ensureBotFramesReady(function () {
          botSeqRunning = true;
          botSeqTriggered = false;
          setBotFrame(0);
          var frameDuration = 1000 / AWAKEN_SEQ_FPS;
          var accum = 0;
          var currentFrame = 0;
          var lastTs = 0;
          function tick(ts) {
            if (!botSeqRunning) return;
            if (!lastTs) lastTs = ts;
            accum += ts - lastTs;
            lastTs = ts;
            while (accum >= frameDuration && currentFrame < botFrames.length - 1) {
              accum -= frameDuration;
              currentFrame += 1;
              setBotFrame(currentFrame);
              if (!botSeqTriggered && currentFrame >= AWAKEN_SEQ_GLOW_TRIGGER_FRAME) {
                botSeqTriggered = true;
                if (typeof onNearEnd === "function") onNearEnd();
              }
            }
            if (currentFrame >= botFrames.length - 1) {
              stopAwakenSequence();
              setBotFrame(botFrames.length - 1);
              if (typeof onComplete === "function") onComplete();
              return;
            }
            awakenSeqRaf = requestAnimationFrame(tick);
          }
          awakenSeqRaf = requestAnimationFrame(tick);
        });
      }

      function syncStageBackground() {
        if (!stage) return;
        stage.style.backgroundImage = BG_IMAGES[bgModeIndex] || BG_IMAGES[0];
        bgToggleBtn?.classList.toggle("is-active", bgModeIndex !== 0);
      }

      function setTaskStep(index) {
        taskStepBars.forEach(function (el, i) {
          el.classList.remove("is-active", "is-done", "is-todo");
          if (i < index) {
            el.classList.add("is-done");
          } else if (i === index) {
            el.classList.add("is-active");
          } else {
            el.classList.add("is-todo");
          }
        });
        if (taskProgressCurrent) taskProgressCurrent.textContent = String(Math.min(index + 1, taskStepBars.length));
        if (taskProgressTotal) taskProgressTotal.textContent = String(taskStepBars.length);
      }

      function setTaskAllDone() {
        taskStepBars.forEach(function (el) {
          el.classList.remove("is-active", "is-todo");
          el.classList.add("is-done");
        });
        if (taskProgressCurrent) taskProgressCurrent.textContent = String(taskStepBars.length);
        if (taskProgressTotal) taskProgressTotal.textContent = String(taskStepBars.length);
      }

      function stopTaskStepProgress() {
        if (taskStepTimer) {
          clearInterval(taskStepTimer);
          taskStepTimer = null;
        }
      }

      function startTaskStepProgress() {
        stopTaskStepProgress();
        if (!taskStepBars.length) return;
        taskStepIndex = 0;
        setTaskStep(taskStepIndex);
        taskStepTimer = setInterval(function () {
          if (taskStepIndex < taskStepBars.length - 1) {
            taskStepIndex += 1;
            setTaskStep(taskStepIndex);
            return;
          }
          setTaskAllDone();
          stopTaskStepProgress();
        }, 900);
      }

      function fitStage() {
        const vw = window.innerWidth;
        const vh = window.innerHeight;
        const scale = Math.min(vw / stageW, vh / stageH);
        root.style.setProperty("--stage-scale", String(scale));
        if (window._particlesRedraw) {
          requestAnimationFrame(function () {
            if (window._particlesRedraw) window._particlesRedraw();
          });
        }
      }

      function setStraightLine() {
        if (!lineMainPath) return;
        lineMainPath.setAttribute("d", "M2 12 L606 12");
      }

      function revealResultStack(showHeadCard) {
        if (!taskStatusWrap) return;
        taskStatusWrap.classList.remove("show", "show-head");
        headInfoCard?.setAttribute("aria-hidden", "true");
        requestAnimationFrame(function () {
          taskStatusWrap.classList.add("show");
          if (showHeadCard) {
            requestAnimationFrame(function () {
              taskStatusWrap.classList.add("show-head");
              headInfoCard?.setAttribute("aria-hidden", "false");
            });
          }
        });
      }

      function syncAsrTopPopup(stateName) {
        if (!asrTopPopup) return;
        var shouldShow = stateName === "state-asr" && !!asrPopupToggle?.checked;
        asrTopPopup.classList.toggle("show", shouldShow);
        asrTopPopup.setAttribute("aria-hidden", shouldShow ? "false" : "true");
      }

      function switchFlowState(nextState) {
        if (nextState !== "state-awaken") {
          stopAwakenSequence();
        }
        if (awakenSlideTimer) {
          clearTimeout(awakenSlideTimer);
          awakenSlideTimer = null;
        }
        if (thinkingThrowTimer) {
          clearTimeout(thinkingThrowTimer);
          thinkingThrowTimer = null;
        }
        if (thinkingTaskTimer) {
          clearTimeout(thinkingTaskTimer);
          thinkingTaskTimer = null;
        }
        if (taskDismissTimer) {
          clearTimeout(taskDismissTimer);
          taskDismissTimer = null;
        }
        stopTaskStepProgress();
        setTaskStep(0);
        taskStatusWrap?.classList.remove("show");
        taskStatusWrap?.classList.remove("is-expanded");
        taskStatusWrap?.classList.remove("show-head");
        headInfoCard?.setAttribute("aria-hidden", "true");
        var auroraCanvasReset = document.querySelector(".aurora-glow canvas");
        if (auroraCanvasReset) {
          auroraCanvasReset.style.animation = "none";
          auroraCanvasReset.style.transform = "";
        }
        body.classList.remove("state-default", "state-awaken", "state-interaction", "state-asr", "state-thinking", "state-task", "state-head", "finished-active", "panel-active", "is-waving", "thinking-aurora-flow", "thinking-throw-icons", "shift-fast", "awaken-to-interaction", "awaken-glow-visible", "awaken-glow-fade", "awaken-glow-slide", "awaken-glow-settled");
        if (nextState === "state-default" || nextState === "state-awaken") {
          body.classList.add("layout-right");
        } else {
          body.classList.remove("layout-right");
        }
        if (nextState === "state-default") {
          setBotFrame(0);
        }
        if (nextState === "state-thinking") {
          // 先立即进入 thinking 基态，避免 ASR -> thinking 过程中线宽短暂回落
          body.classList.add("state-thinking");
          requestAnimationFrame(function () {
            requestAnimationFrame(function () {
              body.classList.add("thinking-aurora-flow");
            });
          });
        } else {
          body.classList.add(nextState);
        }
        if (nextState === "state-default" || nextState === "state-awaken") {
          if (window._auroraSetParams) window._auroraSetParams("interaction");
          if (window._auroraStart) window._auroraStart();
          if (window._auroraSyncTab) window._auroraSyncTab("interaction");
          if (window._particlesStart) window._particlesStart();
        } else if (nextState === "state-interaction") {
          if (window._auroraSetParams) window._auroraSetParams("interaction");
          if (window._auroraStart) window._auroraStart();
          if (window._auroraSyncTab) window._auroraSyncTab("interaction");
          if (window._particlesStart) window._particlesStart();
        } else if (nextState === "state-asr") {
          if (window._auroraSetParams) window._auroraSetParams("asr");
          if (window._auroraStart) window._auroraStart();
          if (window._auroraSyncTab) window._auroraSyncTab("asr");
          if (window._particlesStart) window._particlesStart();
        } else if (nextState === "state-thinking") {
          // 直接从 ASR 平滑过渡到 thinking，避免中途二次切换导致跳变
          if (window._auroraSetParams) window._auroraSetParams("thinking");
          if (window._auroraStart) window._auroraStart();
          if (window._auroraSyncTab) window._auroraSyncTab("thinking");
          if (window._particlesStart) window._particlesStart();
        } else if (nextState === "state-task") {
          revealResultStack(false);
          if (window._auroraSetParams) window._auroraSetParams("interaction");
          if (window._auroraStart) window._auroraStart();
          if (window._auroraSyncTab) window._auroraSyncTab("interaction");
          if (window._particlesStart) window._particlesStart();
        } else if (nextState === "state-head") {
          revealResultStack(true);
          if (window._auroraSetParams) window._auroraSetParams("interaction");
          if (window._auroraStart) window._auroraStart();
          if (window._auroraSyncTab) window._auroraSyncTab("interaction");
          if (window._particlesStart) window._particlesStart();
        } else {
          if (window._auroraStop) window._auroraStop();
          if (window._particlesStop) window._particlesStop();
        }
        Object.keys(allBtns).forEach(function (k) {
          allBtns[k]?.classList.toggle("is-active", k === nextState);
        });
        syncAsrTopPopup(nextState);
        if (body.classList.contains("aurora-params-handoff")) {
          requestAnimationFrame(function () {
            requestAnimationFrame(function () {
              body.classList.remove("aurora-params-handoff");
              body.classList.remove("aurora-geometry-lock");
            });
          });
        }
      }

      function clearFlowTimers() {
        while (flowTimers.length) {
          clearTimeout(flowTimers.pop());
        }
      }

      fitStage();
      syncStageBackground();
      // 将机器人层从光效线容器中拆出，避免调整光效位置时机器人被联动
      (function detachRobotLayer() {
        var overlay = document.querySelector(".overlay");
        var botClip = document.querySelector(".bot-clip");
        if (!overlay || !botClip) return;
        if (botClip.parentElement && botClip.parentElement.classList.contains("lines")) {
          overlay.appendChild(botClip);
        }
      })();
      body.classList.toggle("glow-debug-center", !!FORCE_GLOW_DEBUG_CENTER);
      setStraightLine();
      switchFlowState("state-default");
      window.addEventListener("resize", fitStage);
      bgToggleBtn?.addEventListener("click", function () {
        bgModeIndex = (bgModeIndex + 1) % BG_IMAGES.length;
        try { localStorage.setItem(BG_MODE_STORAGE_KEY, String(bgModeIndex)); } catch (e) { }
        syncStageBackground();
      });
      defaultBtn?.addEventListener("click", function () {
        clearFlowTimers();
        body.classList.remove("robot-awakened");
        switchFlowState("state-default");
      });
      awakenBtn?.addEventListener("click", function () {
        clearFlowTimers();
        switchFlowState("state-awaken");
        body.classList.add("robot-awakened");
        body.classList.remove("awaken-glow-slide", "awaken-glow-settled");
        body.classList.add("awaken-glow-visible");
      });
      asrBtn?.addEventListener("click", function () {
        clearFlowTimers();
        switchFlowState("state-asr");
      });
      asrPopupToggle?.addEventListener("change", function () {
        var currentState = body.classList.contains("state-asr") ? "state-asr" : "";
        syncAsrTopPopup(currentState);
      });
      thinkingBtn?.addEventListener("click", function () {
        clearFlowTimers();
        switchFlowState("state-thinking");
      });
      taskBtn?.addEventListener("click", function () {
        clearFlowTimers();
        switchFlowState("state-task");
      });
      headBtn?.addEventListener("click", function () {
        clearFlowTimers();
        switchFlowState("state-head");
      });
      aiCapsuleBtn?.addEventListener("click", function () {
        if (!aiCapsuleCard) return;
        var willShow = !aiCapsuleCard.classList.contains("show");
        aiCapsuleCard.classList.toggle("show", willShow);
        aiCapsuleCard.setAttribute("aria-hidden", willShow ? "false" : "true");
      });

      // 修复首屏时序：state-default 可能先于 Aurora/粒子初始化触发，导致渲染未启动
      requestAnimationFrame(function () {
        requestAnimationFrame(function () {
          if (window._auroraSetParams) window._auroraSetParams("interaction", true);
          if (window._auroraStart) window._auroraStart();
          if (window._particlesStart) window._particlesStart();
        });
      });

      /* ======== Aurora WebGL Glow ======== */
      (function initAurora() {
        var container = document.getElementById("aurora-glow");
        if (!container) return;

        var canvas = document.createElement("canvas");
        canvas.style.width = "100%";
        canvas.style.height = "100%";
        container.appendChild(canvas);

        var gl = canvas.getContext("webgl2", { alpha: true, premultipliedAlpha: true, antialias: true, preserveDrawingBuffer: true });
        if (!gl) return;

        gl.clearColor(0, 0, 0, 0);
        gl.enable(gl.BLEND);
        gl.blendFunc(gl.ONE, gl.ONE_MINUS_SRC_ALPHA);

        var VERT = "#version 300 es\nin vec2 position;\nvoid main(){gl_Position=vec4(position,0.0,1.0);}";

        var FRAG = [
          "#version 300 es",
          "precision highp float;",
          "uniform float uFlowTime;",
          "uniform float uMorphTime;",
          "uniform float uAmplitude;",
          "uniform vec3 uColorStops[5];",
          "uniform float uColorAlphas[5];",
          "uniform vec2 uResolution;",
          "uniform float uBlend;",
          "uniform float uBrightness;",
          "uniform float uNoiseScale;",
          "uniform float uVertShift;",
          "out vec4 fragColor;",
          "vec3 permute(vec3 x){return mod(((x*34.0)+1.0)*x,289.0);}",
          "float snoise(vec2 v){",
          "  const vec4 C=vec4(0.211324865405187,0.366025403784439,-0.577350269189626,0.024390243902439);",
          "  vec2 i=floor(v+dot(v,C.yy));vec2 x0=v-i+dot(i,C.xx);",
          "  vec2 i1=(x0.x>x0.y)?vec2(1.0,0.0):vec2(0.0,1.0);",
          "  vec4 x12=x0.xyxy+C.xxzz;x12.xy-=i1;i=mod(i,289.0);",
          "  vec3 p=permute(permute(i.y+vec3(0.0,i1.y,1.0))+i.x+vec3(0.0,i1.x,1.0));",
          "  vec3 m=max(0.5-vec3(dot(x0,x0),dot(x12.xy,x12.xy),dot(x12.zw,x12.zw)),0.0);",
          "  m=m*m;m=m*m;",
          "  vec3 x2=2.0*fract(p*C.www)-1.0;vec3 h=abs(x2)-0.5;",
          "  vec3 ox=floor(x2+0.5);vec3 a0=x2-ox;",
          "  m*=1.79284291400159-0.85373472095314*(a0*a0+h*h);",
          "  vec3 g;g.x=a0.x*x0.x+h.x*x0.y;g.yz=a0.yz*x12.xz+h.yz*x12.yw;",
          "  return 130.0*dot(m,g);",
          "}",
          "struct ColorStop{vec3 color;float position;};",
          "void main(){",
          "  vec2 uv=gl_FragCoord.xy/uResolution;",
          "  ColorStop colors[6];",
          "  colors[0]=ColorStop(uColorStops[0],0.0);",
          "  colors[1]=ColorStop(uColorStops[1],0.2);",
          "  colors[2]=ColorStop(uColorStops[2],0.4);",
          "  colors[3]=ColorStop(uColorStops[3],0.6);",
          "  colors[4]=ColorStop(uColorStops[4],0.8);",
          "  vec3 cBridge=mix(uColorStops[4],uColorStops[0],0.5);",
          "  colors[5]=ColorStop(cBridge,1.0);",
          "  float alphas[6];",
          "  alphas[0]=uColorAlphas[0];alphas[1]=uColorAlphas[1];alphas[2]=uColorAlphas[2];",
          "  alphas[3]=uColorAlphas[3];alphas[4]=uColorAlphas[4];alphas[5]=mix(uColorAlphas[4],uColorAlphas[0],0.5);",
          "  int idx=0;",
          "  for(int i=0;i<5;i++){if(colors[i].position<=uv.x)idx=i;}",
          "  ColorStop c0=colors[idx];ColorStop c1=colors[idx+1];",
          "  float range=c1.position-c0.position;",
          "  float lf=clamp((uv.x-c0.position)/range,0.0,1.0);",
          "  vec3 rampColor=mix(c0.color,c1.color,lf);",
          "  float rampAlpha=mix(alphas[idx],alphas[idx+1],lf);",
          "  float flippedY=1.0-uv.y;",
          "  float n=snoise(vec2(uv.x*uNoiseScale-uFlowTime*0.1,uMorphTime*0.25))*0.5*uAmplitude;",
          "  n=exp(n);",
          "  float h=(flippedY*2.0-n+uVertShift);",
          "  float intensity=clamp(h*0.8,0.0,1.5);",
          "  float a=smoothstep(0.0,uBlend,intensity);",
          "  float finalA=a*rampAlpha;",
          "  vec3 col=rampColor*uBrightness*finalA;",
          "  fragColor=vec4(col, finalA);",
          "}"
        ].join("\n");

        function compileShader(src, type) {
          var s = gl.createShader(type);
          gl.shaderSource(s, src);
          gl.compileShader(s);
          return s;
        }

        var vs = compileShader(VERT, gl.VERTEX_SHADER);
        var fs = compileShader(FRAG, gl.FRAGMENT_SHADER);
        var prog = gl.createProgram();
        gl.attachShader(prog, vs);
        gl.attachShader(prog, fs);
        gl.linkProgram(prog);
        gl.useProgram(prog);

        var verts = new Float32Array([-1, -1, 3, -1, -1, 3]);
        var buf = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, buf);
        gl.bufferData(gl.ARRAY_BUFFER, verts, gl.STATIC_DRAW);
        var posLoc = gl.getAttribLocation(prog, "position");
        gl.enableVertexAttribArray(posLoc);
        gl.vertexAttribPointer(posLoc, 2, gl.FLOAT, false, 0, 0);

        var uFlowTime = gl.getUniformLocation(prog, "uFlowTime");
        var uMorphTime = gl.getUniformLocation(prog, "uMorphTime");
        var uAmplitude = gl.getUniformLocation(prog, "uAmplitude");
        var uBlend = gl.getUniformLocation(prog, "uBlend");

        function hexToRGB(hex) {
          var r = parseInt(hex.slice(1, 3), 16) / 255;
          var g = parseInt(hex.slice(3, 5), 16) / 255;
          var b = parseInt(hex.slice(5, 7), 16) / 255;
          return [r, g, b];
        }

        function hexToRGBAString(hex, alpha) {
          var r = parseInt(hex.slice(1, 3), 16);
          var g = parseInt(hex.slice(3, 5), 16);
          var b = parseInt(hex.slice(5, 7), 16);
          var a = Math.max(0, Math.min(1, Number(alpha)));
          return "rgba(" + r + ", " + g + ", " + b + ", " + a.toFixed(3) + ")";
        }

        function lineRichHex(hex) {
          var r = parseInt(hex.slice(1, 3), 16);
          var g = parseInt(hex.slice(3, 5), 16);
          var b = parseInt(hex.slice(5, 7), 16);
          var avg = (r + g + b) / 3;
          var satBoost = 1.32;
          var darken = 0.80;
          var nr = Math.max(0, Math.min(255, Math.round((avg + (r - avg) * satBoost) * darken)));
          var ng = Math.max(0, Math.min(255, Math.round((avg + (g - avg) * satBoost) * darken)));
          var nb = Math.max(0, Math.min(255, Math.round((avg + (b - avg) * satBoost) * darken)));
          var toHex = function (n) { return n.toString(16).padStart(2, "0"); };
          return "#" + toHex(nr) + toHex(ng) + toHex(nb);

          var c4 = hexToRGBAString(lineRichHex(colors[4]), alphas[4]);

          root.style.setProperty("--line-sync-gradient", c0 + " 0%, " + c1 + " 20%, " + c2 + " 40%, " + c3 + " 60%, " + c4 + " 80%, " + cBridge + " 90%, " + c0 + " 100%");
        }

        function syncLineFlowDuration(flowSpeed) {

            currentValues.bright = lerpVal(transitionFrom.bright, currentTarget.bright, ease);
            currentValues.noise = lerpVal(transitionFrom.noise, currentTarget.noise, ease);

            var interactionOut = { params: Object.assign({}, statePresets.interaction), colors: colorPresets.interaction.colors.slice(), alphas: colorPresets.interaction.alphas.slice() };
            localStorage.setItem("aurora-interaction-saved", JSON.stringify(interactionOut));
            var thinkingOut = { params: Object.assign({}, statePresets.thinking), colors: colorPresets.thinking.colors.slice(), alphas: colorPresets.thinking.alphas.slice() };
            localStorage.setItem("aurora-thinking-saved", JSON.stringify(thinkingOut));
          } catch (e) { }
        }

        /* ---- Tab 切换 ---- */
        var tabs = document.querySelectorAll(".aurora-tab");
        var asrSection = document.getElementById("asr-params");
        var interSection = document.getElementById("interaction-params");
        var thinkingSection = document.getElementById("thinking-params");

        tabs.forEach(function (tab) {
          tab.addEventListener("click", function () {
            var target = tab.getAttribute("data-tab");
            activeTab = target;
            tabs.forEach(function (t) { t.classList.toggle("is-active", t.getAttribute("data-tab") === target); });
            asrSection.classList.toggle("is-visible", target === "asr");
            interSection.classList.toggle("is-visible", target === "interaction");
            thinkingSection.classList.toggle("is-visible", target === "thinking");
            setColorControlsByTab(target);
          });
        });

        /* ---- 重置/保存/复制 根据当前 tab 操作 ---- */
        var resetBtn2 = document.getElementById("aurora-reset-btn");
        if (resetBtn2) {
          resetBtn2.addEventListener("click", function () {
            if (activeTab === "interaction") {
              iResetSliders();
            } else if (activeTab === "thinking") {
              tResetSliders();
            } else {
              resetAll();
            }
            saveAuroraAutos();
          });
        }

        var saveBtn2 = document.getElementById("aurora-save-btn");
        if (saveBtn2) {
          saveBtn2.addEventListener("click", function () {
            if (activeTab === "interaction") {
              iDefaultParams.amp = parseFloat(document.getElementById("ictrl-amp").value);
              iDefaultParams.blend = parseFloat(document.getElementById("ictrl-blend").value);
              iDefaultParams.flowSpeed = parseFloat(document.getElementById("ictrl-flow-speed").value);
              iDefaultParams.morphSpeed = parseFloat(document.getElementById("ictrl-morph-speed").value);
              iDefaultParams.bright = parseFloat(document.getElementById("ictrl-bright").value);
              iDefaultParams.noise = parseFloat(document.getElementById("ictrl-noise").value);
              iDefaultParams.vshift = parseFloat(document.getElementById("ictrl-vshift").value);
              var saved = { params: Object.assign({}, iDefaultParams), colors: colorPresets.interaction.colors.slice(), alphas: colorPresets.interaction.alphas.slice() };
              try { localStorage.setItem("aurora-interaction-saved", JSON.stringify(saved)); } catch (e) { }
            } else if (activeTab === "thinking") {
              tDefaultParams.amp = parseFloat(document.getElementById("tctrl-amp").value);
              tDefaultParams.blend = parseFloat(document.getElementById("tctrl-blend").value);
              tDefaultParams.flowSpeed = parseFloat(document.getElementById("tctrl-flow-speed").value);
              tDefaultParams.morphSpeed = parseFloat(document.getElementById("tctrl-morph-speed").value);
              tDefaultParams.bright = parseFloat(document.getElementById("tctrl-bright").value);
              tDefaultParams.noise = parseFloat(document.getElementById("tctrl-noise").value);
              tDefaultParams.vshift = parseFloat(document.getElementById("tctrl-vshift").value);
              var tSavedOut = { params: Object.assign({}, tDefaultParams), colors: colorPresets.thinking.colors.slice(), alphas: colorPresets.thinking.alphas.slice() };
              try { localStorage.setItem("aurora-thinking-saved", JSON.stringify(tSavedOut)); } catch (e) { }
            } else {
              defaultParams.amp = parseFloat(document.getElementById("ctrl-amp").value);
              defaultParams.blend = parseFloat(document.getElementById("ctrl-blend").value);
              defaultParams.flowSpeed = parseFloat(document.getElementById("ctrl-flow-speed").value);
              defaultParams.morphSpeed = parseFloat(document.getElementById("ctrl-morph-speed").value);
              defaultParams.bright = parseFloat(document.getElementById("ctrl-bright").value);
              defaultParams.noise = parseFloat(document.getElementById("ctrl-noise").value);
              defaultParams.vshift = parseFloat(document.getElementById("ctrl-vshift").value);
              colorPresets.asr.colors = colorPresets.asr.colors.slice();
              colorPresets.asr.alphas = colorPresets.asr.alphas.slice();
              var saved2 = { params: defaultParams, colors: colorPresets.asr.colors.slice(), alphas: colorPresets.asr.alphas.slice() };
              try { localStorage.setItem("aurora-saved", JSON.stringify(saved2)); } catch (e) { }
            }
            saveBtn2.textContent = "已保存 ✓";
            setTimeout(function () { saveBtn2.textContent = "保存"; }, 1500);
            saveAuroraAutos();
          });
        }

        var copyBtn2 = document.getElementById("aurora-copy-btn");
        var paramsOut2 = document.getElementById("aurora-params-out");
        if (copyBtn2) {
          copyBtn2.addEventListener("click", function () {
            var obj;
            if (activeTab === "interaction") {
              var iColors = [];
              colorPresets.interaction.colors.forEach(function (c, i) { iColors.push({ color: c, alpha: colorPresets.interaction.alphas[i] }); });
              obj = {
                mode: "interaction",
                amplitude: parseFloat(document.getElementById("ictrl-amp").value),
                blend: parseFloat(document.getElementById("ictrl-blend").value),
                flowSpeed: parseFloat(document.getElementById("ictrl-flow-speed").value),
                morphSpeed: parseFloat(document.getElementById("ictrl-morph-speed").value),
                brightness: parseFloat(document.getElementById("ictrl-bright").value),
                noiseScale: parseFloat(document.getElementById("ictrl-noise").value),
                vertShift: parseFloat(document.getElementById("ictrl-vshift").value),
                colorStops: iColors
              };
            } else if (activeTab === "thinking") {
              var tColors = [];
              colorPresets.thinking.colors.forEach(function (c, i) { tColors.push({ color: c, alpha: colorPresets.thinking.alphas[i] }); });
              obj = {
                mode: "thinking",
                amplitude: parseFloat(document.getElementById("tctrl-amp").value),
                blend: parseFloat(document.getElementById("tctrl-blend").value),
                flowSpeed: parseFloat(document.getElementById("tctrl-flow-speed").value),
                morphSpeed: parseFloat(document.getElementById("tctrl-morph-speed").value),
                brightness: parseFloat(document.getElementById("tctrl-bright").value),
                noiseScale: parseFloat(document.getElementById("tctrl-noise").value),
                vertShift: parseFloat(document.getElementById("tctrl-vshift").value),
                colorStops: tColors
              };
            } else {
              var colors = [];
              colorIds.forEach(function (id, i) {
                colors.push({ color: document.getElementById(id).value, alpha: parseFloat(document.getElementById(alphaIds[i]).value) });
              });
              obj = {
                mode: "asr",
                amplitude: parseFloat(document.getElementById("ctrl-amp").value),
                blend: parseFloat(document.getElementById("ctrl-blend").value),
                flowSpeed: parseFloat(document.getElementById("ctrl-flow-speed").value),
                morphSpeed: parseFloat(document.getElementById("ctrl-morph-speed").value),
                brightness: parseFloat(document.getElementById("ctrl-bright").value),
                noiseScale: parseFloat(document.getElementById("ctrl-noise").value),
                vertShift: parseFloat(document.getElementById("ctrl-vshift").value),
                colorStops: colors
              };
            }
            var str = JSON.stringify(obj, null, 2);
            paramsOut2.textContent = str;
            paramsOut2.style.display = "block";
            navigator.clipboard.writeText(str).catch(function () { });
          });
        }

        function getParamsByTab(tab) {
          if (tab === "interaction") {
            return {
              amp: parseFloat(document.getElementById("ictrl-amp").value),
              blend: parseFloat(document.getElementById("ictrl-blend").value),
              flowSpeed: parseFloat(document.getElementById("ictrl-flow-speed").value),
              morphSpeed: parseFloat(document.getElementById("ictrl-morph-speed").value),
              bright: parseFloat(document.getElementById("ictrl-bright").value),
              noise: parseFloat(document.getElementById("ictrl-noise").value),
              vshift: parseFloat(document.getElementById("ictrl-vshift").value)
            };
          }
          if (tab === "thinking") {
            return {
              amp: parseFloat(document.getElementById("tctrl-amp").value),
              blend: parseFloat(document.getElementById("tctrl-blend").value),
              flowSpeed: parseFloat(document.getElementById("tctrl-flow-speed").value),
              morphSpeed: parseFloat(document.getElementById("tctrl-morph-speed").value),
              bright: parseFloat(document.getElementById("tctrl-bright").value),
              noise: parseFloat(document.getElementById("tctrl-noise").value),
              vshift: parseFloat(document.getElementById("tctrl-vshift").value)
            };
          }
          return {
            amp: parseFloat(document.getElementById("ctrl-amp").value),
            blend: parseFloat(document.getElementById("ctrl-blend").value),
            flowSpeed: parseFloat(document.getElementById("ctrl-flow-speed").value),
            morphSpeed: parseFloat(document.getElementById("ctrl-morph-speed").value),
            bright: parseFloat(document.getElementById("ctrl-bright").value),
            noise: parseFloat(document.getElementById("ctrl-noise").value),
            vshift: parseFloat(document.getElementById("ctrl-vshift").value)
          };
        }
        function setTabParamInputs(tab, p) {
          var prefix = tab === "asr" ? "" : (tab === "interaction" ? "i" : "t");
          var map = [
            ["amp", "amp"], ["blend", "blend"], ["flow-speed", "flowSpeed"],
            ["morph-speed", "morphSpeed"], ["bright", "bright"], ["noise", "noise"], ["vshift", "vshift"]
          ];
          map.forEach(function (pair) {
            var idSuffix = pair[0];
            var key = pair[1];
            var ctrl = document.getElementById(prefix + "ctrl-" + idSuffix);
            var val = document.getElementById(prefix + "val-" + idSuffix);
            if (!ctrl || !val || p[key] == null) return;
            ctrl.value = p[key];
            val.textContent = Number(p[key]).toFixed(2);
          });
        }
        var syncBtn = document.getElementById("aurora-sync-btn");
        if (syncBtn) {
          syncBtn.addEventListener("click", function () {
            var src = getParamsByTab(activeTab);
            var srcColors = {
              colors: colorPresets[activeTab].colors.slice(),
              alphas: colorPresets[activeTab].alphas.slice()
            };
            ["asr", "interaction", "thinking"].forEach(function (tab) {
              if (tab !== activeTab) {
                setTabParamInputs(tab, src);
                colorPresets[tab].colors = srcColors.colors.slice();
                colorPresets[tab].alphas = srcColors.alphas.slice();
              }
            });
            statePresets.asr = Object.assign({}, src);
            statePresets.interaction = Object.assign({}, src);
            statePresets.thinking = Object.assign({}, src);
            if (body.classList.contains("state-asr") || body.classList.contains("state-interaction") || body.classList.contains("state-thinking")) {
              Object.keys(src).forEach(function (k) { currentValues[k] = src[k]; });
              var mode = getCurrentAuroraMode();
              if (mode && colorPresets[mode]) applyColors(colorPresets[mode].colors, colorPresets[mode].alphas);
              transitionFrom = null;
            }
            setColorControlsByTab(activeTab);
            saveAuroraAutos();
            syncBtn.textContent = "已同步 ✓";
            setTimeout(function () { syncBtn.textContent = "同步到其他Tab"; }, 1200);
          });
        }
        window.addEventListener("beforeunload", function () {
          saveAuroraAutos();
        });

        /* ---- 状态切换时自动高亮对应 tab ---- */
        window._auroraSyncTab = function (mode) {
          activeTab = mode;
          tabs.forEach(function (t) { t.classList.toggle("is-active", t.getAttribute("data-tab") === mode); });
          asrSection.classList.toggle("is-visible", mode === "asr");
          interSection.classList.toggle("is-visible", mode === "interaction");
          thinkingSection.classList.toggle("is-visible", mode === "thinking");
          setColorControlsByTab(mode);
        };
      })();

      /* ======== 点阵遮罩（白底 + 透明圆孔，程序化） ======== */
      (function initDotMatrixMask() {
        var canvas = document.getElementById("particle-canvas");
        if (!canvas) return;
        var ctx = canvas.getContext("2d");
        var running = false;
        var rafId = 0;
        var dpr = Math.min(window.devicePixelRatio || 1, 2);

        var defaultDot = {
          offsetX: 0,
          offsetY: 0,
          baseRadius: 8.2,
          sizeFalloff: 0.22,
          cols: 56,
          pitchMul: 1,
          stagger: false
        };
        var dotParams = Object.assign({}, defaultDot);

        function resize() {
          var w = canvas.offsetWidth;
          var h = canvas.offsetHeight;
          canvas.width = w * dpr;
          canvas.height = h * dpr;
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }

        function drawDotMatrix() {
          var w = canvas.width / dpr;
          var h = canvas.height / dpr;
          ctx.clearRect(0, 0, w, h);
          ctx.fillStyle = "#ffffff";
          ctx.fillRect(0, 0, w, h);
          var cols = Math.max(8, Math.round(dotParams.cols));
          var pitch = (w / cols) * dotParams.pitchMul;
          if (pitch < 2) pitch = 2;
          var rows = Math.ceil(h / pitch) + 3;
          var maxR = rows > 1 ? rows - 1 : 1;
          ctx.save();
          ctx.translate(dotParams.offsetX, dotParams.offsetY);
          ctx.globalCompositeOperation = "destination-out";
          for (var r = 0; r < rows; r++) {
            var t = r / maxR;
            var rad = Math.max(0.35, dotParams.baseRadius * (1 - dotParams.sizeFalloff * t));
            var stagger = dotParams.stagger && (r % 2 === 1) ? pitch * 0.5 : 0;
            var colsDraw = Math.ceil((w + pitch * 2) / pitch) + 2;
            for (var c = 0; c < colsDraw; c++) {
              var cx = c * pitch + pitch * 0.5 - pitch + stagger;
              var cy = r * pitch + pitch * 0.5 - pitch;
              ctx.beginPath();
              ctx.arc(cx, cy, rad, 0, Math.PI * 2);
              ctx.fill();
            }
          }
          ctx.restore();
          ctx.globalCompositeOperation = "source-over";

          // 仅在 aurora 有 alpha 的区域保留点阵（保持纯白，不跟随光晕上色）
          var auroraCanvas = document.querySelector(".aurora-glow canvas");
          if (auroraCanvas && auroraCanvas.width > 0 && auroraCanvas.height > 0) {
            ctx.globalCompositeOperation = "destination-in";
            ctx.drawImage(auroraCanvas, 0, 0, w, h);
            ctx.globalCompositeOperation = "source-over";
          }
        }

        function renderLoop() {
          if (!running) return;
          drawDotMatrix();
          rafId = requestAnimationFrame(renderLoop);
        }

        function readParamsFromInputs() {
          dotParams.offsetX = parseFloat(document.getElementById("dm-ctrl-off-x").value);
          dotParams.offsetY = parseFloat(document.getElementById("dm-ctrl-off-y").value);
          dotParams.baseRadius = parseFloat(document.getElementById("dm-ctrl-radius").value);
          dotParams.sizeFalloff = parseFloat(document.getElementById("dm-ctrl-falloff").value);
          dotParams.cols = parseInt(document.getElementById("dm-ctrl-cols").value, 10);
          dotParams.pitchMul = parseFloat(document.getElementById("dm-ctrl-pitch-mul").value);
          dotParams.stagger = document.getElementById("dm-ctrl-stagger").checked;
        }

        function persistDotParams() {
          try { localStorage.setItem("dot-matrix-params", JSON.stringify(dotParams)); } catch (e) { }
        }

        function syncValueLabels() {
          document.getElementById("dm-val-off-x").textContent = String(Math.round(dotParams.offsetX));
          document.getElementById("dm-val-off-y").textContent = String(Math.round(dotParams.offsetY));
          document.getElementById("dm-val-radius").textContent = dotParams.baseRadius.toFixed(1);
          document.getElementById("dm-val-falloff").textContent = dotParams.sizeFalloff.toFixed(2);
          document.getElementById("dm-val-cols").textContent = String(dotParams.cols);
          document.getElementById("dm-val-pitch-mul").textContent = dotParams.pitchMul.toFixed(2);
        }

        function applyParamsToInputs() {
          document.getElementById("dm-ctrl-off-x").value = dotParams.offsetX;
          document.getElementById("dm-ctrl-off-y").value = dotParams.offsetY;
          document.getElementById("dm-ctrl-radius").value = dotParams.baseRadius;
          document.getElementById("dm-ctrl-falloff").value = dotParams.sizeFalloff;
          document.getElementById("dm-ctrl-cols").value = dotParams.cols;
          document.getElementById("dm-ctrl-pitch-mul").value = dotParams.pitchMul;
          document.getElementById("dm-ctrl-stagger").checked = !!dotParams.stagger;
          syncValueLabels();
        }

        function bindDmSlider(id, valId, key, fmt) {
          var el = document.getElementById(id);
          var vEl = document.getElementById(valId);
          if (!el) return;
          el.addEventListener("input", function () {
            readParamsFromInputs();
            if (fmt === "int") vEl.textContent = String(Math.round(dotParams[key]));
            else if (fmt === "r1") vEl.textContent = dotParams[key].toFixed(1);
            else if (fmt === "r2") vEl.textContent = dotParams[key].toFixed(2);
            if (running) drawDotMatrix();
            persistDotParams();
          });
        }
        bindDmSlider("dm-ctrl-off-x", "dm-val-off-x", "offsetX", "int");
        bindDmSlider("dm-ctrl-off-y", "dm-val-off-y", "offsetY", "int");
        bindDmSlider("dm-ctrl-radius", "dm-val-radius", "baseRadius", "r1");
        bindDmSlider("dm-ctrl-falloff", "dm-val-falloff", "sizeFalloff", "r2");
        bindDmSlider("dm-ctrl-cols", "dm-val-cols", "cols", "int");
        bindDmSlider("dm-ctrl-pitch-mul", "dm-val-pitch-mul", "pitchMul", "r2");
        document.getElementById("dm-ctrl-stagger").addEventListener("change", function () {
          readParamsFromInputs();
          if (running) drawDotMatrix();
          persistDotParams();
        });

        var dmReset = document.getElementById("dm-reset-btn");
        if (dmReset) {
          dmReset.addEventListener("click", function () {
            dotParams = Object.assign({}, defaultDot);
            applyParamsToInputs();
            if (running) drawDotMatrix();
            persistDotParams();
          });
        }

        var dmSave = document.getElementById("dm-save-btn");
        if (dmSave) {
          dmSave.addEventListener("click", function () {
            readParamsFromInputs();
            persistDotParams();
            var t0 = dmSave.textContent;
            dmSave.textContent = "已保存 ✓";
            setTimeout(function () { dmSave.textContent = t0; }, 1200);
          });
        }

        if (!FORCE_SCREENSHOT_PANEL_DEFAULTS) {
          try {
            var raw = localStorage.getItem("dot-matrix-params");
            if (raw) {
              var o = JSON.parse(raw);
              Object.keys(defaultDot).forEach(function (k) {
                if (o[k] != null) dotParams[k] = o[k];
              });
            }
          } catch (e) { }
        }
        applyParamsToInputs();

        window._particlesRedraw = function () {
          if (running) {
            resize();
            drawDotMatrix();
          }
        };

        window._particlesStart = function () {
          if (running) return;
          running = true;
          readParamsFromInputs();
          resize();
          renderLoop();
        };

        window._particlesStop = function () {
          running = false;
          cancelAnimationFrame(rafId);
          if (ctx) ctx.clearRect(0, 0, canvas.width / dpr, canvas.height / dpr);
        };

        window.addEventListener("resize", function () {
          if (running) {
            resize();
            drawDotMatrix();
          }
        });

        window._dotMatrixGetParams = function () {
          readParamsFromInputs();
          return Object.assign({}, dotParams);
        };
        window._dotMatrixSetParams = function (p) {
          if (!p || typeof p !== "object") return;
          Object.keys(defaultDot).forEach(function (k) {
            if (p[k] != null) dotParams[k] = p[k];
          });
          applyParamsToInputs();
          if (running) drawDotMatrix();
          persistDotParams();
        };
      })();

    })();
  </script>
